# Configuração comum — SmartStock (Spring Boot)
# Perfil padrão: dev (veja application-dev.yml)
# Sobrescrever máquina a máquina: copie application-local-example.yml para application-local.yml e ative perfis dev,local

spring:
  application:
    name: smartstock-backend
  # Sem variavel: ativa o perfil dev (application-dev.yml)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
