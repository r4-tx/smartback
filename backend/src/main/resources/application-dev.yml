# ========== Perfil dev — tudo externalizável ==========
# Sobrescreva por: variáveis de ambiente, JVM -D, application-local.yml (perfil local), ou CI/CD.
#
# Convenções Spring Boot (relaxed binding), exemplos:
#   SERVER_PORT=8090
#   SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/smartjava
#   SPRING_DATASOURCE_USERNAME=postgres
#   SPRING_DATASOURCE_PASSWORD=secret
#   SPRING_JPA_HIBERNATE_DDL_AUTO=validate
#
# Placeholders DB_* (este projeto):
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#
# CORS: lista em YAML ou uma origem por env APP_CORS_ORIGIN_1 ... APP_CORS_ORIGIN_4

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:smartjava}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:987123}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      pool-name: smartstock-pool
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:${JPA_DDL_AUTO:update}}
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

# Origens permitidas para o front (Next.js em outra porta: inclua aqui ou em application-local.yml)
app:
  cors:
    path-pattern: ${APP_CORS_PATH_PATTERN:/**}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    allowed-origins:
      - ${APP_CORS_ORIGIN_1:http://localhost:3000}
      - ${APP_CORS_ORIGIN_2:http://127.0.0.1:3000}
      - ${APP_CORS_ORIGIN_3:http://localhost:3001}
      - ${APP_CORS_ORIGIN_4:http://127.0.0.1:3001}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
