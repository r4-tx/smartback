# Perfil prod: spring.profiles.active=prod
# Obrigatório: SPRING_DATASOURCE_* e APP_PUBLIC_FRONTEND_URL (CORS).

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      pool-name: smartstock-pool-prod

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    path-pattern: ${APP_CORS_PATH_PATTERN:/**}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allowed-origins:
      - ${APP_PUBLIC_FRONTEND_URL}
